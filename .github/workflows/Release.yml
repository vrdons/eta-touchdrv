name: Build, Test & Release

on:
  push:
    #branches: [main]
    tags: ["v*.*.*"]

jobs:
  deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Sync Debian changelog version to release tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -E -i "1 s/^eta-touchdrv \([^)]*\)/eta-touchdrv (${version})/" packaging/debian/changelog

      - name: Stage Debian packaging tree
        run: |
          rm -rf debian
          mkdir -p debian
          cp -a packaging/debian/. debian/
          cp packaging/common/eta-touchdrv@.service debian/
          cp packaging/common/60-eta-touchdrv.rules debian/

      - name: Build Debian package
        uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          docker-image: pardus/yirmibes
          buildpackage-opts: -b -uc -us
          extra-build-deps: devscripts git equivs
          artifacts-dir: debian/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages
          path: debian/artifacts/

  aur:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    container:
      image: archlinux:base-devel

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Prepare Arch build deps
        run: |
          pacman -Sy --noconfirm --needed git openssh
          useradd --create-home --shell /bin/bash builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Calculate Arch pkgrel (auto bump)
        run: |
          version="${GITHUB_REF_NAME#v}"
          aur_pkgver=""
          aur_pkgrel=""

          if git clone --depth 1 https://aur.archlinux.org/eta-touchdrv.git /tmp/aur-current; then
            aur_pkgver="$(awk -F= '/^pkgver=/{print $2}' /tmp/aur-current/PKGBUILD | head -n1)"
            aur_pkgrel="$(awk -F= '/^pkgrel=/{print $2}' /tmp/aur-current/PKGBUILD | head -n1)"
          fi

          pkgrel=1
          if [[ "${aur_pkgver}" == "${version}" && "${aur_pkgrel}" =~ ^[0-9]+$ ]]; then
            pkgrel=$((aur_pkgrel + 1))
          fi

          echo "AUR pkgver: ${aur_pkgver:-<none>}"
          echo "AUR pkgrel: ${aur_pkgrel:-<none>}"
          echo "Target pkgver: ${version}"
          echo "Target pkgrel: ${pkgrel}"

          echo "AUR_PKGVER=${version}" >> "${GITHUB_ENV}"
          echo "AUR_PKGREL=${pkgrel}" >> "${GITHUB_ENV}"

      - name: Sync PKGBUILD version to release tag
        run: |
          runuser -u builder -- bash -lc "cd ${GITHUB_WORKSPACE}/packaging/arch && \
            sed -i 's/^pkgver=.*/pkgver=${AUR_PKGVER}/' PKGBUILD && \
            sed -i 's/^pkgrel=.*/pkgrel=${AUR_PKGREL}/' PKGBUILD && \
            makepkg --printsrcinfo > .SRCINFO"

      - name: Build AUR package
        run: |
          runuser -u builder -- bash -lc "cd ${GITHUB_WORKSPACE}/packaging/arch && makepkg --syncdeps --clean --noconfirm"

      - name: Upload AUR package artifact
        uses: actions/upload-artifact@v7
        with:
          name: aur-package
          path: packaging/arch/

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Publish to AUR
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/eta-touchdrv.git aur-repo
          cp packaging/arch/PKGBUILD packaging/arch/.SRCINFO aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git commit -m "Update eta-touchdrv ${GITHUB_REF_NAME#v}"
            git push origin master
          fi

  release:
    runs-on: ubuntu-latest
    needs: [deb, aur]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: deb-packages
          path: dist

      - uses: actions/download-artifact@v8
        with:
          name: aur-package
          path: dist

      - uses: softprops/action-gh-release@v3
        with:
          files: |
                 dist/deb/**
                 dist/aur/**
