name: Build, Test & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: etap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          apt-get update
          apt-get install -y build-essential equivs devscripts git

      - name: Prepare
        run: mkdir -p artifacts

      - name: Extract & Build
        run: |
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          cd /github/workspace
          
          # DSC dosyasını bul
          dsc_file=$(ls /packages/$REPO_NAME/*.dsc | head -n 1)
          
          mkdir -p build-area
          dpkg-source -x "$dsc_file" "build-area/$REPO_NAME"
          
          cd "build-area/$REPO_NAME"
          
          # Bağımlılıkları yükle ve paketle
          mk-build-deps -i -r -t "apt-get -y"
          dpkg-buildpackage -b -uc -us

      - name: Collect artifacts
        run: |
          find build-area -type f \( -name "*.deb" -o -name "*.changes" -o -name "*.udeb" \) -exec cp {} artifacts/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: artifacts/
          retention-days: 5 

  test:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: etap

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: /tmp/artifacts

      - name: Install & test
        run: |
          apt-get update
          # Bağımlılıklarla birlikte kurmayı dene
          apt-get install -y /tmp/artifacts/*.deb || (apt-get install -f -y && apt-get install -y /tmp/artifacts/*.deb)
          echo "Testler başarıyla tamamlandı."

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
