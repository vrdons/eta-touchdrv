name: Build, Test & Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Sync Debian changelog version to release tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed -E -i "1 s/^eta-touchdrv \([^)]*\)/eta-touchdrv (${version})/" package/debian/changelog

      - name: Stage Debian package tree
        run: |
          rm -rf debian common
          mkdir -p debian common
          cp -a package/debian/. debian/
          cp -a package/common/. common/

      - name: Build Debian package
        uses: jtdor/build-deb-action@v1
        env:
          DEB_BUILD_OPTIONS: noautodbgsym
        with:
          docker-image: pardus/yirmibes
          buildpackage-opts: -b -uc -us
          extra-build-deps: devscripts git equivs
          artifacts-dir: debian/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages
          path: debian/artifacts/*

  arch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve Arch version
        id: arch_version
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          version="$(printf '%s' "${version}" | sed 's/[^[:alnum:]._]/./g')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare Arch PKGBUILD
        run: |
          set -euo pipefail
          mkdir -p arch-out/eta-touchdrv-git
          cp -a package/arch/src/eta-touchdrv/package/arch/PKGBUILD arch-out/eta-touchdrv-git/PKGBUILD
          sed -i 's/^pkgname=.*/pkgname=eta-touchdrv-git/' arch-out/eta-touchdrv-git/PKGBUILD
          sed -i 's/^pkgver=.*/pkgver=${{ steps.arch_version.outputs.version }}/' arch-out/eta-touchdrv-git/PKGBUILD
          sed -i 's#cd "${srcdir}/${pkgname}-${pkgver}"#cd "${srcdir}/eta-touchdrv-${pkgver}"#' arch-out/eta-touchdrv-git/PKGBUILD

      - name: Build Arch package
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}/arch-out/eta-touchdrv-git:/work" \
            -w /work \
            archlinux:base-devel \
            bash -lc 'pacman -Sy --noconfirm --needed git >/dev/null && uid="$(stat -c %u /work)" && gid="$(stat -c %g /work)" && groupadd -g "${gid}" buildgroup 2>/dev/null || true && useradd -m -u "${uid}" -g "${gid}" builduser 2>/dev/null || true && su builduser -c "cd /work && makepkg --syncdeps --noconfirm --rmdeps"'

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-packages
          path: arch-out/eta-touchdrv-git/*.pkg.tar.zst

  release:
    runs-on: ubuntu-latest
    needs: [deb, arch]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: deb-packages
          path: dist/deb

      - uses: actions/download-artifact@v8
        with:
          name: arch-packages
          path: dist/arch

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**
